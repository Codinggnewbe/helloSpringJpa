<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|오류 ${errorCode} - Product Management|">오류 발생</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 80px auto; padding: 0 20px; color: #333; text-align: center; }
        .error-icon { font-size: 5em; margin-bottom: 16px; }
        .error-code { font-size: 4em; font-weight: bold; color: #e74c3c; margin: 0; line-height: 1; }
        .error-title { font-size: 1.6em; color: #2c3e50; margin: 12px 0 24px; }
        .error-box { background: #fff5f5; border: 1px solid #f5c6cb; border-radius: 8px; padding: 20px 28px; margin: 24px 0; text-align: left; }
        .error-box p { margin: 8px 0; line-height: 1.7; }
        .error-label { font-weight: bold; color: #c0392b; }
        .btn { display: inline-block; padding: 10px 24px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; margin-top: 8px; }
        .btn:hover { background: #357abd; }
        .btn-gray { background: #6c757d; }
        .btn-gray:hover { background: #545b62; }
    </style>
</head>
<body>

    <div class="error-icon">⚠️</div>
    <p class="error-code" th:text="${errorCode}">500</p>
    <h1 class="error-title" th:text="${errorTitle}">오류가 발생했습니다</h1>

    <div class="error-box">
        <p th:if="${errorMessage}">
            <span class="error-label">오류 내용: </span>
            <span th:text="${errorMessage}">오류 메시지</span>
        </p>
        <p th:if="${errorDetail}">
            <span class="error-label">안내: </span>
            <span th:text="${errorDetail}">상세 안내</span>
        </p>
    </div>

    <a class="btn" th:href="@{/products}">← 상품 목록으로 돌아가기</a>

</body>
</html>
